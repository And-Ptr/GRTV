name: alphacy

on:
  schedule:
    - cron: "*/30 * * * *"   # Τρέχει κάθε 30 λεπτά
  workflow_dispatch:         # Χειροκίνητη εκτέλεση

jobs:
  fetch-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run alphacy scraper
        run: |
          cd core/platforms
          python alphacy.py
          cd ../..

      - name: Commit updated stream file
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add streams/alphacy.m3u8
          git commit -m "Update alphacy stream" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
