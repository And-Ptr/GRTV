name: alphacy

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix broken Azure mirrors
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu/|http://archive.ubuntu.com/ubuntu/|g' /etc/apt/sources.list
          sudo sed -i 's|http://security.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config --global user.email "your-email@example.com"
          git config --global user.name "Update Bot"

      - name: Install Python dependencies
        run: |
          cd core/platforms
          pip3 install playwright beautifulsoup4

      - name: Install Playwright Browsers
        run: |
          cd core/platforms
          playwright install chromium
          playwright install-deps

      - name: Run script
        run: |
          cd core/platforms
          python3 alphacy.py

      - name: Commit only if changed
        run: |
          if git diff --quiet; then
            echo "No changes detected — skipping commit"
          else
            echo "Changes detected — committing"
            git add -A
            git commit -m "streams updated"
            git push
          fi
