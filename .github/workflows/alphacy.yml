name: alphacy

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # Κάθε 30 λεπτά

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Configure Git
        run: |
          git config --global user.email "your-email@example.com"
          git config --global user.name "Update Bot"

      - name: Install Python dependencies
        run: |
          cd core/platforms
          pip3 install beautifulsoup4 playwright

      - name: Install Playwright Browsers
        run: |
          cd core/platforms
          playwright install chromium

      - name: Run script
        run: |
          cd core/platforms
          python3 alphacy.py

      - name: Commit changes
        run: |
          git add -A
          git commit -m "streams updated" || echo "No changes to commit"

      - name: Push changes
        run: git push
